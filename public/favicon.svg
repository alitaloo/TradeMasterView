<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b8a"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  
  <!-- 圖表 -->
  <path d="M12 44 L24 32 L32 40 L44 24 L52 32" 
        stroke="url(#accent)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- 上升箭頭 -->
  <polygon points="48,20 52,28 44,26" fill="url(#accent)"/>
  
  <!-- 圓點 -->
  <circle cx="12" cy="44" r="3" fill="#4ecca3"/>
  <circle cx="24" cy="32" r="3" fill="#4ecca3"/>
  <circle cx="32" cy="40" r="3" fill="#ffc107"/>
  <circle cx="44" cy="24" r="3" fill="#e94560"/>
  <circle cx="52" cy="32" r="3" fill="#e94560"/>
</svg>
